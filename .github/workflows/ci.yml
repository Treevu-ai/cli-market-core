name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e .

      - name: Smoke test (import modules)
        run: |
          python -c "
          from market_core import market_core
          from market_core import market_stats
          from market_core import market_indicators
          from market_core import market_mcp
          from market_core import market_basket
          from market_core import market_billing
          from market_core import market_db
          from market_core import market_alerts
          from market_core import market_security
          from market_core import market_spread
          from market_core import market_stores
          from market_core import market_units
          from market_core import market_enrich_sources
          from market_core import market_enrich_subcategory
          from market_core import market_intel_agent
          from market_core import price_confidence
          from market_core import source_health
          from market_core import store_credentials
          from market_core import data_v1_service
          from market_core import dashboard_glossary
          from market_core import dashboard_quality
          from market_core import dashboard_renderer
          from market_core import dashboard_view_model
          from market_core import market_health_alert
          from market_core import retailer_onboarding
          from market_connectors import vtex, shopify, magento
          print('All 26 modules imported successfully')
          "

  test:
    runs-on: ubuntu-latest
    needs: smoke
    timeout-minutes: 10
    env:
      CI: "true"
      MARKET_SKIP_LIVE: "1"

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest -q -m "not integration"
